name: Generate and Release Resume

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Installs XeTeX and the Fira Code system font
    - name: Install Pandoc, TeX, and Fonts
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-fonts-extra fonts-firacode

    # Uses xelatex to properly render the OpenType Fira Code font
    - name: Convert Markdown to PDF
      run: pandoc resume.md -o resume.pdf --pdf-engine=xelatex

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: resume.pdf
        name: Resume Version ${{ github.ref_name }}
        draft: false
        prerelease: false