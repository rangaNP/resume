name: Generate and Release Resume

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Removed the failing system fonts. We rely purely on TeXLive now.
    - name: Install Pandoc and TeX
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc texlive-latex-base texlive-fonts-recommended texlive-fonts-extra

    # Reverted to standard pandoc PDF generation
    - name: Convert Markdown to PDF
      run: pandoc resume.md -o resume.pdf

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: resume.pdf
        name: Resume Version ${{ github.ref_name }}
        draft: false
        prerelease: false